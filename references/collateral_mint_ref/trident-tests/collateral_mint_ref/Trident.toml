# Trident v0.12.0 scaffold  - generated by cf-invariants-anchor-emit.
# Iteration budget matches the atlas CI per-cell budget (design_notes.md).

[fuzz]
# Per-cell fuzz iteration budget. Wall-clock cap is enforced by the CI
# `timeout-minutes` knob (spec §3, §9).
fuzz_iterations = 1000
# Deterministic seed so a failing sequence in CI reproduces locally.
seed = 0
# Emit `trident snapshot`-style logs on every flow so `INVARIANT VIOLATED`
# markers reach stdout.
log_level = "info"

[programs]
# The program under test. `trident-cli` links against `../../programs/collateral_mint_ref`.
collateral_mint_ref = "../../programs/collateral_mint_ref"
